name: Release Patches (Unsigned)

on:
  workflow_call:
    outputs:
      artifact-id:
        description: "The ID of the uploaded artifact"
        value: ${{ jobs.build-release-patch-unsigned.outputs.artifact-id }}
      zip-name:
        description: "The name of the ZIP file without extension"
        value: ${{ jobs.build-release-patch-unsigned.outputs.zip-name }}
  workflow_dispatch:

jobs:
  build-release-patch-unsigned:

    name: "Build Release Patch (Unsigned)"
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - uses: dkfans/setup-cpp@master

    - name: Update system
      run: |
        set -eux
        sudo apt update
        sudo apt install -y build-essential g++-mingw-w64-i686 libpng16-16t64 7zip

    - name: Build gfx
      run: |
        set -eux
        BUILD_NUMBER=$(git rev-list --count HEAD)
        PACKAGE_SUFFIX=
        make BUILD_NUMBER=$BUILD_NUMBER PACKAGE_SUFFIX=$PACKAGE_SUFFIX pkg-enginegfx

    - name: Build
      run: |
        set -eux
        BUILD_NUMBER=$(git rev-list --count HEAD)
        PACKAGE_SUFFIX=
        make BUILD_NUMBER=$BUILD_NUMBER PACKAGE_SUFFIX=$PACKAGE_SUFFIX heavylog DEBUG=1 -k
        make BUILD_NUMBER=$BUILD_NUMBER PACKAGE_SUFFIX=$PACKAGE_SUFFIX standard
        make BUILD_NUMBER=$BUILD_NUMBER PACKAGE_SUFFIX=$PACKAGE_SUFFIX package
        echo "ZIP_NAME=$(basename -s .7z pkg/keeperfx*.7z)" >> $GITHUB_ENV
        rm pkg/keeperfx*.7z

    - name: Upload artifact
      id: upload-artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ZIP_NAME }}
        path: pkg/**
      
    outputs:
      artifact-id: ${{ steps.upload-artifact.outputs.artifact-id }}
      zip-name: ${{ env.ZIP_NAME }}

  build-release-patch-linux-unsigned:

    name: "Build Release Patch Linux x86_64 (Unsigned)"
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Update system
      run: |
        set -eux
        sudo apt update
        sudo apt install -y \
          build-essential \
          pkg-config \
          curl \
          libavcodec-dev \
          libavformat-dev \
          libavutil-dev \
          libopenal-dev \
          libluajit-5.1-dev \
          libminizip-dev \
          libnatpmp-dev \
          libspng-dev \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-net-dev \
          libswresample-dev \
          libminiupnpc-dev \
          zlib1g-dev \
          zip

    - name: Build and package Linux release zip
      id: build-linux
      run: |
        set -eux
        VER_MAJOR=$(grep -E '^VER_MAJOR=' version.mk | cut -d= -f2)
        VER_MINOR=$(grep -E '^VER_MINOR=' version.mk | cut -d= -f2)
        VER_RELEASE=$(grep -E '^VER_RELEASE=' version.mk | cut -d= -f2)
        BUILD_NUMBER=$(git rev-list --count HEAD)

        LINUX_ZIP_NAME=keeperfx-linux_x86_64-${VER_MAJOR}_${VER_MINOR}_${VER_RELEASE}_${BUILD_NUMBER}-patch
        echo "zip_name=$LINUX_ZIP_NAME" >> $GITHUB_OUTPUT

        make BUILD_NUMBER=$BUILD_NUMBER VER_SUFFIX= -f linux.mk

        mkdir -p pkg/linux/lib
        cp bin/keeperfx pkg/linux/
        cp assets/linux/launch.sh pkg/linux/

        ldd bin/keeperfx | awk '/=> \/|^\// {print $(NF-1)}' | sort -u > pkg/linux/required-libs.txt
        while read -r lib; do
          lib_name=$(basename "$lib")
          # Keep core runtime and common desktop stack libraries system-provided.
          if echo "$lib_name" | grep -Eq '^(ld-linux-.*\.so.*|libc\.so.*|libm\.so.*|libpthread\.so.*|librt\.so.*|libdl\.so.*|libgcc_s\.so.*|libstdc\+\+\.so.*|libz\.so.*|libSDL2.*\.so.*|libopenal\.so.*|libasound\.so.*|libpulse.*\.so.*|libdbus-1\.so.*|libX11\.so.*|libXext\.so.*|libXcursor\.so.*|libXi\.so.*|libXrandr\.so.*|libXrender\.so.*|libXfixes\.so.*|libXss\.so.*|libXxf86vm\.so.*|libxcb.*\.so.*|libwayland-.*\.so.*|libxkbcommon\.so.*|libdrm\.so.*|libgbm\.so.*|libGL\.so.*|libEGL\.so.*|libvulkan\.so.*)$'; then
            continue
          fi
          cp -L "$lib" pkg/linux/lib/
        done < pkg/linux/required-libs.txt

        chmod +x pkg/linux/launch.sh
        (cd pkg/linux && zip -9 -r "../${LINUX_ZIP_NAME}.zip" .)

    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.build-linux.outputs.zip_name }}
        path: pkg/${{ steps.build-linux.outputs.zip_name }}.zip